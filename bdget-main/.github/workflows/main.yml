name: Build, Analyze and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Clonar el repositorio completo (necesario para el historial de SonarQube)
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Paso 2: Configurar el entorno de Java 17 para compilar con Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Paso 3: Inyectar las credenciales secretas en el application.properties de producción
      - name: Update db url
        run: |
          db_url_escaped=$(printf '%s\n' "${{ secrets.DB_URL }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_url>|$db_url_escaped|" src/main/resources/application.properties
        shell: bash

      - name: Update db username
        run: |
          db_username_escaped=$(printf '%s\n' "${{ secrets.DB_USERNAME }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_username>|$db_username_escaped|" src/main/resources/application.properties
        shell: bash

      - name: Update db password
        run: |
          db_password_escaped=$(printf '%s\n' "${{ secrets.DB_PASSWORD }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_password>|$db_password_escaped|" src/main/resources/application.properties
        shell: bash

      # Paso 4: Cachear dependencias de SonarQube para acelerar ejecuciones futuras
      - name: Cache SonarQube packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Paso 5: Correr pruebas, generar cobertura con JaCoCo y enviar métricas a SonarQube
      - name: Build and analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw clean verify sonar:sonar \
            -Dsonar.projectKey=bdget-project \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      # Paso 6: Autenticarse de forma segura en DockerHub
      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Paso 7: Construir la imagen Docker usando tu usuario XxCristopherxXC
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/bdget:latest .

      # Paso 8: Subir la imagen final a tu repositorio de DockerHub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/bdget:latest

      # Paso 9: Autenticar el entorno del Runner con tus credenciales de AWS
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}

      # Paso 10: Cargar temporalmente tu clave privada (.pem) en el entorno seguro
      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Paso 11: Conectarse al servidor EC2 por SSH y realizar el despliegue del contenedor
      - name: SSH commands to deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'
            # Autenticarse en DockerHub desde la instancia EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          
            # Descargar el nuevo contenedor actualizado
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/bdget:latest
          
            # Limpiar versiones previas del contenedor para liberar el puerto 8080
            docker stop bdget || true && docker rm bdget || true
          
            # Desplegar la aplicación en segundo plano
            docker run -d --name bdget -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/bdget:latest
          EOF