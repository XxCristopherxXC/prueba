name: CI/CD + Security Pipeline

on:
  push:
    branches:
      - main

jobs:

  # =========================
  # 🔐 1. SNYK SCAN
  # =========================
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Snyk
        run: npm install -g snyk

      # Corre el test de verdad y exporta los resultados reales a un JSON sin romper el pipeline
      - name: Run Snyk and Generate Report
        run: |
          snyk test --file=pom.xml --token=${{ secrets.SNYK_TOKEN }} --json > snyk-report.json || true
        working-directory: bdget-main

      - name: Upload Snyk Report
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: bdget-main/snyk-report.json

  # =========================
  # 🧪 2. TEST + JACOCO
  # =========================
  test:
    name: Run Tests with JaCoCo
    runs-on: ubuntu-latest
    needs: snyk-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw
        working-directory: bdget-main

      - name: Update db credentials for testing
        run: |
          db_url_escaped=$(printf '%s\n' "${{ secrets.DB_URL }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_url>|$db_url_escaped|" src/main/resources/application.properties
          db_username_escaped=$(printf '%s\n' "${{ secrets.DB_USERNAME }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_username>|$db_username_escaped|" src/main/resources/application.properties
          db_password_escaped=$(printf '%s\n' "${{ secrets.DB_PASSWORD }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_password>|$db_password_escaped|" src/main/resources/application.properties
        working-directory: bdget-main
        shell: bash

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Run tests
        run: ./mvnw clean verify
        working-directory: bdget-main

      # Subimos tanto el reporte XML como el sitio para reusarlo en Sonar y guardarlo como evidencia
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: bdget-main/target/site/jacoco/

  # =========================
  # 📊 3. SONARCLOUD
  # =========================
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw
        working-directory: bdget-main

      # Descargamos los reportes generados en el paso de Test para no volver a ejecutar los tests
      - name: Download JaCoCo Report
        uses: actions/download-artifact@v4
        with:
          name: jacoco-report
          path: bdget-main/target/site/jacoco/

      # Usamos sonar:sonar directamente especificando la ruta del reporte XML descargado
      - name: Run SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw sonar:sonar \
          -Dsonar.projectKey=XxCristopherxXC_prueba \
          -Dsonar.organization=xxcristopherxxc \
          -Dsonar.host.url=https://sonarcloud.io \
          -Dsonar.token=$SONAR_TOKEN \
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        working-directory: bdget-main

  # =========================
  # 🧱 4. BUILD & DEPLOY (DOCKER + AWS)
  # =========================
  deploy:
    name: Build Image & Deploy to AWS
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw
        working-directory: bdget-main

      - name: Inject production secrets
        run: |
          db_url_escaped=$(printf '%s\n' "${{ secrets.DB_URL }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_url>|$db_url_escaped|" src/main/resources/application.properties
          db_username_escaped=$(printf '%s\n' "${{ secrets.DB_USERNAME }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_username>|$db_username_escaped|" src/main/resources/application.properties
          db_password_escaped=$(printf '%s\n' "${{ secrets.DB_PASSWORD }}" | sed 's/[&/\]/\\&/g')
          sed -i "s|<db_password>|$db_password_escaped|" src/main/resources/application.properties
        working-directory: bdget-main
        shell: bash

      - name: Build JAR
        run: ./mvnw clean package -DskipTests
        working-directory: bdget-main

      - name: Log in to DockerHub
        uses: docker/login-action@v2 
        with:
          username: crbarrueto
          password: ${{ secrets.DOCKER }}

      - name: Build Docker Image
        run: docker build -t crbarrueto/bdget:latest .
        working-directory: bdget-main

      - name: Push Docker Image
        run: docker push crbarrueto/bdget:latest

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1  
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}  

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # Pasamos de forma segura el token de Docker usando variables de entorno de SSH
      - name: SSH commands to deploy
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER }}
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} "DOCKER_PASSWORD='$DOCKER_PASSWORD'" 'bash -s' << 'EOF'
            echo "$DOCKER_PASSWORD" | docker login -u crbarrueto --password-stdin
            docker pull crbarrueto/bdget:latest
            docker stop bdget || true && docker rm bdget || true
            docker run -d --name bdget -p 8080:8080 crbarrueto/bdget:latest
          EOF
